<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rollcall Status</title>
    <style>
        :root {
            --accent: #2068c9;
            --bg: #101418;
            --fg: #f8f9fa;
            --muted: #aeb8c2;
            --panel-scale: 0.5;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
            font-family: Arial, Helvetica, sans-serif;
            cursor: none;
        }
        .screen {
            width: calc(100vw / var(--panel-scale));
            height: calc(100vh / var(--panel-scale));
            display: flex;
            flex-direction: column;
            transform: scale(var(--panel-scale));
            transform-origin: top left;
        }
        .bar {
            min-height: 12vh;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4vw;
            font-size: clamp(12px, 3vw, 22px);
            font-weight: 700;
        }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 3vh 5vw;
            gap: 1vh;
        }
        .status {
            font-size: clamp(22px, 9vw, 44px);
            line-height: 1.05;
            font-weight: 800;
            white-space: nowrap;
        }
        .message {
            color: var(--fg);
            font-size: clamp(12px, 4.5vw, 22px);
            line-height: 1.18;
            font-weight: 700;
        }
        .meta {
            color: var(--muted);
            font-size: clamp(10px, 3.4vw, 16px);
            line-height: 1.2;
        }
        .steps {
            margin-top: 2vh;
            display: grid;
            gap: 1.2vh;
            color: var(--fg);
        }
        .flow-title {
            color: var(--muted);
            font-size: clamp(10px, 2.4vw, 16px);
            line-height: 1.2;
            font-weight: 800;
            text-transform: uppercase;
        }
        .step {
            display: grid;
            grid-template-columns: 2.6em 1fr;
            align-items: center;
            gap: 0.8em;
            font-size: clamp(10px, 2.8vw, 18px);
            line-height: 1.25;
            font-weight: 700;
        }
        .step-number {
            width: 2.6em;
            height: 2.6em;
            border: 2px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85em;
            color: var(--fg);
            background: rgba(255, 255, 255, 0.08);
        }
        .branch {
            display: grid;
            gap: 0.7vh;
            padding-left: 0.5vw;
            border-left: 3px solid var(--accent);
        }
        .branch-label {
            color: var(--accent);
            font-size: clamp(6px, 1.8vw, 10px);
            line-height: 1.2;
            font-weight: 800;
        }
        .footer {
            height: 2vh;
            margin: 0 5vw 3vh;
            background: var(--accent);
        }
    </style>
</head>
<body>
    <div class="screen">
        <div class="bar">
            <span>ROLLCALL</span>
            <span id="clock">--:--</span>
        </div>
        <main class="content">
            <div id="status" class="status">READY</div>
            <div id="message" class="message">Dang khoi dong</div>
            <div id="name" class="meta">-</div>
            <div id="note" class="meta">-</div>
            <section class="steps" aria-label="Rollcall steps">
                <div class="flow-title">Cac buoc diem danh</div>
                <div class="step">
                    <span class="step-number">1</span>
                    <span>Quet mat</span>
                </div>
                <div class="branch">
                    <div class="branch-label">Neu khong thay trong DB</div>
                    <div class="step">
                        <span class="step-number">2</span>
                        <span>Quet van tay</span>
                    </div>
                    <div class="step">
                        <span class="step-number">3</span>
                        <span>Quet lai khi duoc yeu cau</span>
                    </div>
                    <div class="step">
                        <span class="step-number">4</span>
                        <span>Doi quan tri vien xu ly</span>
                    </div>
                </div>
                <div class="branch">
                    <div class="branch-label">Neu da thay mat trong DB</div>
                    <div class="step">
                        <span class="step-number">2</span>
                        <span>Quet van tay</span>
                    </div>
                    <div class="step">
                        <span class="step-number">3</span>
                        <span>Cho fuzzy decision</span>
                    </div>
                </div>
            </section>
        </main>
        <div class="footer"></div>
    </div>

    <script>
        const colors = {
            idle: '#2068c9',
            ok: '#198754',
            review: '#f0ad00',
            denied: '#dc3545',
            error: '#dc3545'
        };

        function setAccent(color) {
            document.documentElement.style.setProperty('--accent', color);
        }

        function updateClock() {
            const clock = document.getElementById('clock');
            if (!clock) return;
            const now = new Date();
            clock.textContent =
                String(now.getHours()).padStart(2, '0') + ':' +
                String(now.getMinutes()).padStart(2, '0');
        }

        let latestShownKey = null;
        let idleTimer = null;
        let showingIdle = true;

        function displayIdle() {
            showingIdle = true;
            setAccent(colors.idle);
            document.getElementById('status').textContent = 'READY';
        }

        function displayResult(data) {
            showingIdle = false;
            setAccent(colors[data.state] || colors.idle);
            document.getElementById('status').textContent = data.status_label || data.label || 'READY';
            document.getElementById('message').textContent = data.message || '-';
            document.getElementById('name').textContent = data.name || '-';
            document.getElementById('note').textContent = data.note || data.time || '-';
        }

        function getResultKey(data) {
            return [
                data.latest_id,
                data.status,
                data.decision,
                data.note,
                data.time,
                data.name
            ].join('|');
        }

        function scheduleIdle() {
            if (idleTimer) {
                clearTimeout(idleTimer);
            }
            idleTimer = setTimeout(displayIdle, 3000);
        }

        async function refreshStatus() {
            try {
                const response = await fetch('/api/status', {cache: 'no-store'});
                if (!response.ok) throw new Error('status failed');
                const data = await response.json();
                if (!data.latest_id) {
                    latestShownKey = null;
                    if (showingIdle) return;
                    displayIdle();
                    return;
                }

                const resultKey = getResultKey(data);
                if (resultKey !== latestShownKey) {
                    latestShownKey = resultKey;
                    displayResult(data);
                    scheduleIdle();
                }
            } catch (error) {
                if (idleTimer) {
                    clearTimeout(idleTimer);
                }
                showingIdle = false;
                setAccent(colors.error);
                document.getElementById('status').textContent = 'LOI';
                document.getElementById('message').textContent = 'Mat ket noi server';
                document.getElementById('name').textContent = '-';
                document.getElementById('note').textContent = '-';
            }
        }

        updateClock();
        displayIdle();
        refreshStatus();
        setInterval(updateClock, 1000);
        setInterval(refreshStatus, 1500);
    </script>
</body>
</html>
